<nav class="site-nav" aria-label="Main navigation">
  <div class="container">
    <ul class="nav-links" id="nav-links">
      {{ range .Site.Menus.main }}
      {{ if .HasChildren }}
      <li class="nav-item nav-item--has-children">
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }} aria-haspopup="true" aria-expanded="false">{{ .Name }}</a>
        <ul class="nav-submenu">
          {{ range .Children }}
          <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </li>
      {{ else }}
      <li class="nav-item"><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
      {{ end }}
    </ul>

    <a href="/" class="nav-logo" aria-label="{{ .Site.Title }} home">
      <img src="/images/logos/logo-offwhite.svg" alt="T4EQ — Tech for Equality" class="nav-logo-img">
    </a>

    <button class="nav-toggle" aria-controls="nav-links" aria-expanded="false" aria-label="Toggle menu">
      <svg class="nav-toggle__icon nav-toggle__icon--open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="nav-toggle__icon nav-toggle__icon--close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="5" y1="5" x2="19" y2="19"/>
        <line x1="19" y1="5" x2="5" y2="19"/>
      </svg>
    </button>
  </div>
</nav>
