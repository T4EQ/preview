{{- /* Contact form band. Params: background, title, level, intro, action, email */ -}}
<section class="c-band {{ .background | default "c-band--purple" }}"{{ with .id }} id="{{ . }}"{{ end }}>
  {{ with .title }}
  <div class="c-band__bar"><div class="container">
    {{ if eq $.level "h1" }}<h1 class="c-band__title">{{ . }}</h1>{{ else }}<h2 class="c-band__title">{{ . }}</h2>{{ end }}
  </div></div>
  {{ end }}
  <div class="container">
    {{ with .intro }}<p class="c-band__intro c-band__intro--wide c-band__intro--lead">{{ . }}</p>{{ end }}
    <form class="c-form" action="{{ .action | default "#" }}" method="POST"{{ with .email }} data-email="{{ . }}"{{ end }}>
      <div class="c-form__field">
        <label class="c-form__label" for="name">Your Name</label>
        <input class="c-form__input" type="text" id="name" name="name" required>
      </div>
      <div class="c-form__field">
        <label class="c-form__label" for="email">Email Address</label>
        <input class="c-form__input" type="email" id="email" name="email" required>
      </div>
      <div class="c-form__field">
        <label class="c-form__label" for="message">Message</label>
        <textarea class="c-form__textarea" id="message" name="message" required></textarea>
      </div>
      <button class="c-btn" type="submit">Send <span class="c-arrow" aria-hidden="true">→</span></button>
      <p class="c-form__status" role="status" aria-live="polite" hidden></p>
    </form>
  </div>
</section>
