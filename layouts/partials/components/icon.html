{{- /* Card icon. Params: name (icon file path under /images/icons). Falls back to circuit motif. */ -}}
{{ if .name }}
<span class="c-card__icon" aria-hidden="true">
  <img src="{{ .name }}" alt="">
</span>
{{ else }}
<span class="c-card__icon" aria-hidden="true">
  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="24" cy="24" r="4"/>
    <path d="M24 20v-8M24 28v8M20 24h-8M28 24h8"/>
    <circle cx="24" cy="10" r="2"/>
    <circle cx="24" cy="38" r="2"/>
    <circle cx="10" cy="24" r="2"/>
    <circle cx="38" cy="24" r="2"/>
    <path d="M27 21l6-6M21 27l-6 6M27 27l6 6M21 21l-6-6"/>
  </svg>
</span>
{{ end }}
