<!DOCTYPE html>
<html lang="{{ with .Site.Language.Locale }}{{ . }}{{ else }}en{{ end }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  {{ with .Site.Params.ogImage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

  {{/* Favicon */}}
  <link rel="icon" type="image/svg+xml" href="/images/logos/favicon-cropped.svg">

  {{/* Styles */}}
  <link rel="stylesheet" href="/css/main.css?v={{ (readFile "static/css/main.css") | hash.FNV32a }}">

  {{/* Preconnect to Google Fonts (loaded in CSS) */}}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

  {{ partial "nav.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="/js/main.js" defer></script>

</body>
</html>
